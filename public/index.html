<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SafeTrade</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.inventory{
background:#1e293b;
padding:15px;
border-radius:12px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}

.item{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.item:hover{
background:#475569;
}

.trade{
background:#1e293b;
padding:15px;
border-radius:12px;
margin:20px;
}

.trade-area{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:10px;
}

.dropzone{
border:2px dashed #475569;
padding:20px;
border-radius:10px;
min-height:80px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2ea6ff;
color:white;
margin-top:15px;
}

.price{
margin-top:8px;
color:#94a3b8;
}

</style>
</head>

<body>

<header>SafeTrade</header>

<div class="container">

<div class="inventory">

<h3>Your Inventory</h3>

<div id="myInventory" class="grid"></div>

</div>

<div class="inventory">

<h3>Partner Inventory</h3>

<div id="partnerInventory" class="grid"></div>

</div>

</div>

<div class="trade">

<h3>Trade Window</h3>

<div class="trade-area">

<div>
<h4>Your Offer</h4>
<div id="myTrade" class="dropzone"></div>
</div>

<div>
<h4>Partner Offer</h4>
<div id="partnerTrade" class="dropzone"></div>
</div>

</div>

<div style="margin-top:15px">

Offer Price TON
<input id="priceInput" type="number" value="0" style="width:100%;padding:10px;border-radius:8px;border:none">

<div class="price">Market price: <span id="market">0</span> TON</div>
<div class="price">Fee (5%): <span id="fee">0</span> TON</div>
<div class="price">Total: <span id="total">0</span> TON</div>

<button onclick="makeOffer()">Make Offer</button>

</div>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const gifts = [
{name:"Heart Locket",price:15},
{name:"Plush Pepe",price:20},
{name:"Heroic Helmet",price:22},
{name:"Ion Gem",price:30},
{name:"Durov Cap",price:50},
{name:"Magic Potion",price:16},
{name:"Mini Oscar",price:40},
{name:"Astral Shard",price:35},
{name:"Lunar Snake",price:4},
{name:"Snow Globe",price:4},
{name:"Candy Cane",price:2},
{name:"Diamond Ring",price:20},
{name:"Crystal Ball",price:14},
{name:"Toy Bear",price:6},
{name:"Star Notepad",price:4},
{name:"Flying Broom",price:9}
]

const myInventory=document.getElementById("myInventory")
const partnerInventory=document.getElementById("partnerInventory")

let marketPrice=0

function createItem(gift,zone){

let el=document.createElement("div")

el.className="item"
el.innerText=gift.name

el.onclick=()=>{

let item=document.createElement("div")
item.className="item"
item.innerText=gift.name

zone.appendChild(item)

marketPrice+=gift.price
updateMarket()

}

return el

}

gifts.forEach(gift=>{
myInventory.appendChild(createItem(gift,document.getElementById("myTrade")))
})

gifts.slice(0,10).forEach(gift=>{
partnerInventory.appendChild(createItem(gift,document.getElementById("partnerTrade")))
})

function updateMarket(){

document.getElementById("market").innerText=marketPrice
updateFee()

}

document.getElementById("priceInput").addEventListener("input",updateFee)

function updateFee(){

let price=Number(document.getElementById("priceInput").value)

let fee=price*0.05

document.getElementById("fee").innerText=fee.toFixed(2)

document.getElementById("total").innerText=(price+fee).toFixed(2)

}

function makeOffer(){

alert("Trade offer sent!")

}

</script>

</body>
</html>
