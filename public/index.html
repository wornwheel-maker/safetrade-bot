<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SafeTrade</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.button {
  width: 100%;
  padding: 15px;
  background: #2ea6ff;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  margin-top: 10px;
}

.input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #0f172a;
  color: white;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #020617;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.nav div {
  cursor: pointer;
  color: #94a3b8;
}

.nav .active {
  color: white;
}
</style>
</head>

<body>

<div class="header">SafeTrade</div>
<div class="container" id="app"></div>

<div class="nav">
  <div onclick="openPage('trade')" id="nav-trade" class="active">Trade</div>
  <div onclick="openPage('inventory')" id="nav-inventory">Inventory</div>
  <div onclick="openPage('profile')" id="nav-profile">Profile</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let selectedGift = "None";

function openPage(page) {
  document.getElementById("nav-trade").classList.remove("active");
  document.getElementById("nav-inventory").classList.remove("active");
  document.getElementById("nav-profile").classList.remove("active");

  document.getElementById("nav-" + page).classList.add("active");

  if (page === "trade") renderTrade();
  if (page === "inventory") renderInventory();
  if (page === "profile") renderProfile();
}

// TRADE
function renderTrade() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h3>Create Trade</h3>

      <input class="input" id="partner" placeholder="@username">

      <div style="margin-top:10px;">You give</div>
      <button class="button" onclick="openPage('inventory')">${selectedGift}</button>

      <div style="margin-top:10px;">You receive (TON)</div>
      <input class="input" id="price" placeholder="15">

      <div style="margin-top:10px; font-size:14px;">
        Fee: 2%<br>
        You receive: <span id="final">0</span> TON
      </div>

      <button class="button" onclick="createTrade()">Create Trade</button>
    </div>
  `;

  document.getElementById("price").oninput = updateFee;
}

function updateFee() {
  const price = parseFloat(document.getElementById("price").value) || 0;
  document.getElementById("final").innerText = (price * 0.98).toFixed(2);
}

// INVENTORY
function renderInventory() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h3>Your Inventory</h3>

      ${gift("Crystal Ball")}
      ${gift("Lunar Snake")}
      ${gift("Eternal Candle")}
      ${gift("Berry Box")}
    </div>
  `;
}

function gift(name) {
  return `<div class="card" onclick="selectGift('${name}')">${name}</div>`;
}

function selectGift(name) {
  selectedGift = name;
  openPage("trade");
}

// PROFILE
function renderProfile() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h3>Profile</h3>
      <div>@user</div>
      <div style="margin-top:10px;">Balance: 0 TON</div>
      <button class="button">Deposit</button>
      <button class="button">Withdraw</button>
    </div>
  `;
}

// CREATE TRADE
function createTrade() {
  const partner = document.getElementById("partner").value;
  const price = document.getElementById("price").value;

  if (!partner) return alert("Enter username");
  if (!price) return alert("Enter price");
  if (selectedGift === "None") return alert("Select gift");

  fetch("/create-trade", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      partner: partner.replace("@", ""),
      gift: selectedGift,
      price: price,
      fromUser: Telegram.WebApp.initDataUnsafe.user?.username || "unknown"
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert("Trade sent 🚀");
    } else {
      alert("Error");
    }
  });
}

openPage("trade");
</script>

</body>
</html>
