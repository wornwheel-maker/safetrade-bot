<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeTrade</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0b0f19;
color:white;
}

/* PAGES */

.page{
display:none;
padding:20px;
padding-bottom:90px;
}

.active{
display:block;
}

/* PROFILE */

.profile{
text-align:center;
margin-top:25px;
}

.avatar{
width:75px;
height:75px;
border-radius:50%;
background:#1c243a;
margin:auto;
}

.username{
margin-top:10px;
font-size:18px;
}

/* BALANCE */

.balance{
margin-top:20px;
background:#141a2d;
padding:16px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

.deposit{
background:#3b82f6;
border:none;
padding:8px 14px;
border-radius:10px;
color:white;
}

/* MENU */

.menu{
margin-top:15px;
background:#141a2d;
border-radius:14px;
overflow:hidden;
}

.menu-item{
padding:16px;
border-bottom:1px solid #1f2740;
cursor:pointer;
}

.menu-item:last-child{
border:none;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.gift{
background:#141a2d;
padding:10px;
border-radius:10px;
text-align:center;
font-size:13px;
}

/* INPUT */

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#141a2d;
color:white;
margin-top:10px;
}

button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
}

/* BOTTOM NAV */

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0e1323;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.nav{
text-align:center;
font-size:12px;
opacity:0.6;
cursor:pointer;
}

.nav.active{
opacity:1;
}

</style>

</head>

<body>

<!-- PROFILE -->

<div id="profile" class="page active">

<div class="profile">

<div class="avatar"></div>

<div class="username">@user</div>

</div>

<div class="balance">

<div>
Balance<br>
<b>1.19 TON</b>
</div>

<button class="deposit">Deposit</button>

</div>

<div class="menu">

<div class="menu-item" onclick="openPage('inventory')">
🎁 Inventory
</div>

<div class="menu-item" onclick="openPage('trade')">
⚔ Trade
</div>

<div class="menu-item" onclick="openPage('market')">
🛒 Marketplace
</div>

</div>

</div>


<!-- INVENTORY -->

<div id="inventory" class="page">

<h2>Inventory</h2>

<div class="grid">

<div class="gift">Crystal Ball</div>
<div class="gift">Diamond Ring</div>
<div class="gift">Magic Potion</div>
<div class="gift">Astral Shard</div>

</div>

</div>


<!-- TRADE -->

<div id="trade" class="page">

<h2>Create Trade</h2>

<input placeholder="@username partner">

<input placeholder="Gift name">

<input placeholder="Price TON">

<button>Create Trade</button>

</div>


<!-- MARKET -->

<div id="market" class="page">

<h2>Marketplace</h2>

<div class="grid">

<div class="gift">Heart Locket<br>12 TON</div>
<div class="gift">Plush Pepe<br>7 TON</div>
<div class="gift">Diamond Ring<br>20 TON</div>
<div class="gift">Crystal Ball<br>15 TON</div>

</div>

</div>


<!-- BOTTOM NAV -->

<div class="bottom">

<div class="nav active" onclick="openPage('profile')">
👤<br>Profile
</div>

<div class="nav" onclick="openPage('trade')">
⚔<br>Trade
</div>

<div class="nav" onclick="openPage('market')">
🛒<br>Market
</div>

<div class="nav" onclick="openPage('inventory')">
🎁<br>Inventory
</div>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

if(tg.initDataUnsafe.user){

document.querySelector(".username").innerText =
"@" + tg.initDataUnsafe.user.username

}

function openPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

document.querySelectorAll(".nav").forEach(n=>{
n.classList.remove("active")
})

}

</script>

</body>
</html>
