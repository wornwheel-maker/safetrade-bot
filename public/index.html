<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>SafeTrade</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}

header{
font-size:28px;
margin-bottom:20px;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.tab{
padding:10px 16px;
background:#1e293b;
border-radius:8px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.gift{
background:#1e293b;
padding:12px;
border-radius:10px;
cursor:pointer;
}

.gift img{
width:60px;
}

input{
padding:10px;
border-radius:6px;
border:none;
margin:6px;
background:#1e293b;
color:white;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
background:#3b82f6;
color:white;
}

#ton-connect{
margin-bottom:20px;
}

</style>

</head>

<body>

<header>🚀 SafeTrade</header>

<div id="ton-connect"></div>

<div class="tabs">

<div class="tab" onclick="openTab('market')">Marketplace</div>

<div class="tab" onclick="openTab('nft')">NFT Gifts</div>

<div class="tab" onclick="openTab('trade')">Trade</div>

<div class="tab" onclick="openTab('history')">History</div>

</div>

<div id="content"></div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
 manifestUrl:'https://ton.org/tonconnect-manifest.json',
 buttonRootId:'ton-connect'
})

let prices={}

async function loadPrices(){

 const r = await fetch("/api/prices")

 prices = await r.json()

}

const gifts=[

"Heart Locket",
"Plush Pepe",
"Diamond Ring",
"Crystal Ball",
"Astral Shard",
"Jelly Bunny",
"Magic Potion",
"Top Hat"

]

function openTab(tab){

const content=document.getElementById("content")

if(tab==="market"){

let html="<h2>Marketplace</h2><div class='grid'>"

gifts.forEach(g=>{

html+=`

<div class="gift">

<img src="https://dummyimage.com/80x80/333/fff&text=${g[0]}">

<div>${g}</div>

<div>Price: ${prices[g]||"-"} TON</div>

</div>

`

})

html+="</div>"

content.innerHTML=html

}

if(tab==="nft"){

let html="<h2>NFT Gifts</h2><div class='grid'>"

gifts.forEach(g=>{

html+=`

<div class="gift">

<img src="https://dummyimage.com/80x80/555/fff&text=${g[0]}">

<div>${g}</div>

</div>

`

})

html+="</div>"

content.innerHTML=html

}

if(tab==="trade"){

content.innerHTML=`

<h2>Create Trade</h2>

<input id="user" placeholder="@username"><br>

<input id="gift" placeholder="Gift name"><br>

<input id="price" placeholder="Price TON"><br>

<button onclick="createTrade()">Create Trade</button>

`

}

if(tab==="history"){

loadTrades()

}

}

async function createTrade(){

const user=document.getElementById("user").value
const gift=document.getElementById("gift").value
const price=document.getElementById("price").value

await fetch("/api/trade",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

user:user,

gift:gift,

price:price

})

})

alert("Trade created")

}

async function loadTrades(){

const r = await fetch("/api/trades")

const trades = await r.json()

let html="<h2>Trade History</h2>"

trades.forEach(t=>{

html+=`

<div>

${t.user} traded ${t.gift} for ${t.price} TON

</div>

`

})

document.getElementById("content").innerHTML=html

}

loadPrices()

openTab("market")

</script>

</body>
</html>
