<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SafeTrade</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* Header */
.header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

/* Container */
.container {
  padding: 20px;
}

/* Card */
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* Button */
.button {
  width: 100%;
  padding: 15px;
  background: #2ea6ff;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  margin-top: 10px;
}

/* Input */
.input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #0f172a;
  color: white;
}

/* Bottom nav */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #020617;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.nav div {
  cursor: pointer;
  color: #94a3b8;
}

.nav .active {
  color: white;
}
</style>
</head>

<body>

<div class="header">SafeTrade</div>

<div class="container" id="app"></div>

<div class="nav">
  <div onclick="openPage('trade')" id="nav-trade" class="active">Trade</div>
  <div onclick="openPage('inventory')" id="nav-inventory">Inventory</div>
  <div onclick="openPage('profile')" id="nav-profile">Profile</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function openPage(page) {
  document.getElementById("nav-trade").classList.remove("active");
  document.getElementById("nav-inventory").classList.remove("active");
  document.getElementById("nav-profile").classList.remove("active");

  document.getElementById("nav-" + page).classList.add("active");

  if (page === "trade") renderTrade();
  if (page === "inventory") renderInventory();
  if (page === "profile") renderProfile();
}

// ---------- TRADE ----------
function renderTrade() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h3>Create Trade</h3>

      <input class="input" id="partner" placeholder="@username">

      <div style="margin-top:10px;">You give</div>
      <button class="button" onclick="selectGift()">Select Gift</button>

      <div style="margin-top:10px;">You receive (TON)</div>
      <input class="input" id="price" placeholder="15">

      <div style="margin-top:10px; font-size:14px;">
        Fee: 2%<br>
        You receive: <span id="final">0</span> TON
      </div>

      <button class="button" onclick="createTrade()">Create Trade</button>
    </div>

    <div class="card">
      <h3>Active Trades</h3>
      <div>No trades yet</div>
    </div>
  `;

  document.getElementById("price").oninput = updateFee;
}

function updateFee() {
  const price = parseFloat(document.getElementById("price").value) || 0;
  const final = price * 0.98;
  document.getElementById("final").innerText = final.toFixed(2);
}

let selectedGift = "None";

function selectGift() {
  openPage("inventory");
}

// ---------- INVENTORY ----------
function renderInventory() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h3>Your Inventory</h3>

      ${renderGift("Crystal Ball")}
      ${renderGift("Lunar Snake")}
      ${renderGift("Eternal Candle")}
      ${renderGift("Berry Box")}
    </div>
  `;
}

function renderGift(name) {
  return `
    <div class="card" onclick="chooseGift('${name}')">
      ${name}
    </div>
  `;
}

function chooseGift(name) {
  selectedGift = name;
  alert("Selected: " + name);
  openPage("trade");
}

// ---------- PROFILE ----------
function renderProfile() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h3>Profile</h3>
      <div>@username</div>

      <div style="margin-top:10px;">
        Balance: 0 TON
      </div>

      <button class="button">Deposit</button>
      <button class="button">Withdraw</button>
    </div>
  `;
}

// ---------- CREATE TRADE ----------
function createTrade() {
  const partner = document.getElementById("partner").value;
  const price = document.getElementById("price").value;

  if (!partner) return alert("Enter username");
  if (!price) return alert("Enter price");

  alert(
    "Trade created!\n\n" +
    "Partner: " + partner + "\n" +
    "Gift: " + selectedGift + "\n" +
    "Price: " + price + " TON"
  );
}

// init
openPage("trade");
</script>

</body>
</html>
